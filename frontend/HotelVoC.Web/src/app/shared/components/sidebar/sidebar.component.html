<div class="sidebar">

  <div class="sidebar-logo">
    <span class="logo-text">Analysis</span>
  </div>

  <nav class="sidebar-nav">

    <div class="nav-section-label"></div>

    <ng-container *ngIf="authService.getRole() === 'Executive'">
      <a routerLink="/dashboard"
         class="nav-item"
         [class.active]="isActive('dashboard')">
        <span>Home</span>
        <span class="badge-count" *ngIf="criticalCount > 0">{{ criticalCount }}</span>
      </a>
    </ng-container>

    <ng-container *ngIf="authService.getRole() === 'Analyst'">
      <a routerLink="/feedback"
         class="nav-item"
         [class.active]="isActive('feedback')">
        <span>Feedback</span>
      </a>
    </ng-container>

    <div class="nav-section-label"></div>

    <a routerLink="/insights"
       class="nav-item"
       [class.active]="isActive('insights')">
      <span>Topics & Insights</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">
        {{ authService.getEmail()?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="user-details">
        <span class="user-email">{{ authService.getEmail() }}</span>
        <span class="user-role">{{ authService.getRole() }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">⏻</button>
  </div>

</div>
